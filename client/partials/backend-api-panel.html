  </div>
  <div id="apiStatsDisplay" class="api-stats-grid">
    <div class="api-stat-tile banana-stat">

    </div>
    <div class="api-stat-tile apple-stat">
      <div id="apiStatsApple" class="api-stat-value">-</div>
      <div class="api-stat-label">Apple</div>
    </div>
    <div class="api-stat-tile orange-stat">
      <div id="apiStatsOrange" class="api-stat-value">-</div>
      <div class="api-stat-label">Orange</div>
    </div>

</div>
