<div class="page" id="page-edge">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Raspberry Pi 4 - Edge AI Hardware Statistics</div>
    </div>
    <p class="text-xs text-gray-400 mb-6">ការតាមដានរាល់សកម្មភាព Hardware, CPU, Temperature ក្នុងអំឡុងពេលដែល AI
      ដំណើរការ (Real-time Inference)។</p>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-black/40 p-4 rounded-lg border border-white/5 text-center">
        <div class="text-xs text-gray-500">CPU Usage</div>
        <div class="text-3xl font-bold font-mono text-blue-400 mt-1" id="edgeCPU">45%</div>
        <div class="w-full bg-white/5 h-1 rounded-full mt-3 overflow-hidden">
          <div class="bg-blue-500 h-full" id="edgeCPU_bar" style="width: 45%"></div>
        </div>
      </div>
      <div class="bg-black/40 p-4 rounded-lg border border-white/5 text-center">
        <div class="text-xs text-gray-500">Temperature</div>
        <div class="text-3xl font-bold font-mono text-orange-400 mt-1" id="edgeTemp">52.4°C</div>
        <div class="w-full bg-white/5 h-1 rounded-full mt-3 overflow-hidden">
          <div class="bg-orange-500 h-full" id="edgeTemp_bar" style="width: 52%"></div>
        </div>
      </div>
      <div class="bg-black/40 p-4 rounded-lg border border-white/5 text-center">
        <div class="text-xs text-gray-500">RAM Usage</div>
        <div class="text-3xl font-bold font-mono text-purple-400 mt-1" id="edgeRAM">2.1 GB</div>
        <div class="w-full bg-white/5 h-1 rounded-full mt-3 overflow-hidden">
          <div class="bg-purple-500 h-full" id="edgeRAM_bar" style="width: 50%"></div>
        </div>
      </div>
      <div class="bg-black/40 p-4 rounded-lg border border-white/5 text-center">
        <div class="text-xs text-gray-500">Power Draw</div>
        <div class="text-3xl font-bold font-mono text-green-400 mt-1" id="edgePower">3.8W</div>
        <div class="w-full bg-white/5 h-1 rounded-full mt-3 overflow-hidden">
          <div class="bg-green-500 h-full" id="edgePower_bar" style="width: 60%"></div>
        </div>
      </div>
    </div>

    <div class="bg-black/30 p-4 rounded-lg border border-white/5">
      <div class="text-xs text-gray-400 mb-2 font-mono">Inference Latency Profile (Milliseconds)</div>
      <div class="h-[150px] relative">
        <canvas id="latencyChart"></canvas>
      </div>
    </div>
  </div>
</div>
