<div class="page" id="page-iot">
  <div class="card bg-slate-900/80 backdrop-blur-md border border-slate-800 rounded-xl p-6 shadow-2xl">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
      <div>
        <div
          class="text-xl font-bold bg-gradient-to-r from-teal-400 via-cyan-400 to-blue-500 bg-clip-text text-transparent font-sans">
          🚀 FastAPI Async MQTT Pipeline Simulator
        </div>
        <p class="text-xs text-slate-400 mt-1 font-mono">
          Architecture: [Edge Devices] -> [MQTT Broker] -> [FastAPI Async Background Workers] -> [Live Dashboard]
        </p>
      </div>

      <div class="flex gap-2 w-full md:w-auto">
        <button id="btnToggleFastApiSim" onclick="toggleFastApiSimulation()"
          class="flex-1 md:flex-none px-4 py-2 bg-gradient-to-r from-teal-500 to-cyan-600 hover:from-teal-400 hover:to-cyan-500 text-white text-xs font-bold font-mono rounded-lg shadow-lg shadow-cyan-500/20 transition-all duration-300 transform hover:-translate-y-0.5">

        </button>
        <button onclick="burstMultiPublish()"
          class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-cyan-400 text-xs font-bold font-mono rounded-lg border border-slate-700 transition-all">
          💥 Burst Publish (ច្រើនឧបករណ៍)
        </button>
      </div>
    </div>

    <div class="relative rounded-xl overflow-hidden border border-slate-800/80 shadow-inner bg-[#050b14]">
      <canvas id="fastApiCanvas" width="950" height="400" class="w-full h-full block"></canvas>

      <div
        class="absolute top-4 right-4 bg-slate-950/80 backdrop-blur-md border border-cyan-500/30 px-3 py-1.5 rounded-md font-mono text-[11px] text-cyan-400 flex items-center gap-2">
        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
        Active Tasks: <span id="active-tasks-counter" class="font-bold text-white">0</span>
      </div>
    </div>
  </div>
</div>
