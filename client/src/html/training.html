<div class="page" id="page-training">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Training Progress (ការវិវត្តនៃការហ្វឹកហាត់)</div>
      <div class="flex gap-2 items-center">
        <button id="btnTrain" onclick="toggleTraining()"
          class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-xs font-mono">▶ ចាប់ផ្ដើម
          Train</button>
        <button onclick="resetTraining()"
          class="px-3 py-1.5 bg-white/10 text-gray-300 rounded text-xs font-mono">↺ Reset</button>
        <span class="text-xs font-mono text-gray-400 ml-4">Epoch: <span id="currentEpoch"
            class="text-blue-400">0</span>/50</span>
      </div>
    </div>
    <div class="w-full bg-white/5 h-2 rounded-full mb-6 overflow-hidden">
      <div class="h-full bg-gradient-to-r from-blue-500 to-green-500 transition-all duration-300"
        id="trainingProgress" style="width: 0%"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-black/30 p-4 rounded-lg border border-white/5">
        <div class="text-xs text-gray-400 mb-2 font-mono">Loss Metrics (កាន់តែទាបកាន់តែល្អ)</div>
        <canvas id="lossChart" class="h-[180px] w-full"></canvas>
      </div>
      <div class="bg-black/30 p-4 rounded-lg border border-white/5">
        <div class="text-xs text-gray-400 mb-2 font-mono">mAP & Precision Metrics (កាន់តែខ្ពស់កាន់តែល្អ)</div>
        <canvas id="accuracyChart" class="h-[180px] w-full"></canvas>
      </div>
    </div>
  </div>
</div>
